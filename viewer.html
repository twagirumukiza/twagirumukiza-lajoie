<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Joie — Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0d0d0d;--panel:#141414;--ink:#ffffff;--muted:#b8b8b8;--line:rgba(255,255,255,.16)}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif}
    a{text-decoration:none;color:inherit} img{display:block;max-width:100%}
    .top{position:sticky;top:0;z-index:10;padding:16px 0;border-bottom:1px solid var(--line);background:rgba(13,13,13,.86);backdrop-filter:blur(12px)}
    .wrap{width:min(1240px,94vw);margin:0 auto}
    .bar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .title{font-size:.9rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:999px;border:1px solid var(--line);background:#1b1b1b;color:#fff;font-size:.92rem;font-weight:600;cursor:pointer}
    .main{padding:28px 0 40px}
    .frame{display:flex;flex-direction:column;align-items:center;gap:18px}
    .frame img{max-width:min(1240px,94vw);max-height:76vh;width:auto;height:auto;box-shadow:0 20px 60px rgba(0,0,0,.38)}
    .caption{color:var(--muted);text-align:center;font-size:.95rem}
  </style>
</head>
<body>
  <div class="top">
    <div class="wrap bar">
      <div class="title" id="pageTitle">La Joie</div>
      <div class="actions">
        <button class="btn" onclick="goBack()">← Retour</button>
        <a class="btn" id="siteLink" href="index.html">Revenir au site</a>
      </div>
    </div>
  </div>
  <main class="main">
    <div class="wrap frame">
      <img id="mainImage" src="" alt="Artwork" />
      <div class="caption" id="caption">La Joie</div>
    </div>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const src = params.get('src') || 'images/joie-1.jpg';
    const title = params.get('title') || 'La Joie';
    const back = params.get('back') || 'index.html';
    document.getElementById('mainImage').src = src;
    document.getElementById('mainImage').alt = title;
    document.getElementById('pageTitle').textContent = title;
    document.getElementById('caption').textContent = title;
    document.getElementById('siteLink').href = back;
    function goBack(){
      if(document.referrer && document.referrer !== window.location.href){
        history.back();
        setTimeout(function(){ window.location.href = back; }, 350);
      } else {
        window.location.href = back;
      }
    }
  </script>
</body>
</html>
