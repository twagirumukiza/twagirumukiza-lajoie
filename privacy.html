<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Joie — Privacy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f3efe8;--paper:#fbfaf7;--ink:#111;--muted:#6d675f;--line:#ddd4c8}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;line-height:1.65}
    .wrap{width:min(900px,92vw);margin:0 auto}.card{background:var(--paper);border:1px solid var(--line);border-radius:24px;padding:28px;margin:18px 0}
    header{padding:18px 0;border-bottom:1px solid var(--line)} h1{font-size:clamp(2rem,5vw,3.8rem);line-height:.95;letter-spacing:-.04em;margin:0 0 12px} h2{margin:0 0 10px}.muted{color:var(--muted)}
  </style>
</head>
<body>
  <header><div class="wrap">TWAGIRUMUKIZA · La Joie</div></header>
  <main class="wrap">
    <div class="card"><h1>Privacy</h1><p class="muted">For any question about this website or contact requests, please write to <a href="mailto:inno.twa@gmail.com">inno.twa@gmail.com</a>.</p></div>
  </main>
</body>
</html>
